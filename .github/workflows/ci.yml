name: Python-CI-Test
on: [push] 

jobs:
  check-my-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - name: Set up Python
        uses: actions/setup-python@v4 
        with:
          python-version: '3.10'
      - name: Install pytest
        run: pip install pytest 
      - name: Run test
        run: pytest 